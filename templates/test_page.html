<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-flask"></i> Test Page</h1>
            <p>Welcome to the test!</p>
        </div>
        
        <div class="main-content" style="padding: 50px; text-align: center;">
            <div class="test-card" style="background: linear-gradient(135deg, #28a745, #20c997);">
                <div class="test-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h2>You're all set!</h2>
                <p>Your information has been verified. The test will begin shortly.</p>
                <button class="start-test-btn" onclick="window.location.href='/logout'">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
        
        <div class="footer">
            <p>Secure Test Portal - Test Page</p>
        </div>
    </div>
</body>
<script>
    // Prevent back button
    (function() {
        // Push a new state to the history
        history.pushState(null, null, location.href);
        
        // When user tries to go back, push another state
        window.onpopstate = function() {
            history.go(1);
        };
    })();

    // Prevent refresh and tab close during test
    window.onbeforeunload = function() {
        return "Are you sure you want to leave? Your test progress will be lost!";
    };

    // Disable right click (optional)
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
    });

    // Disable keyboard shortcuts for navigation
    document.addEventListener('keydown', function(e) {
        // Disable F5, Ctrl+R, Ctrl+Shift+R, Ctrl+F5, Backspace
        if (e.key === 'F5' || 
            (e.ctrlKey && e.key === 'r') || 
            (e.ctrlKey && e.shiftKey && e.key === 'r') ||
            (e.key === 'Backspace' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA')) {
            e.preventDefault();
        }
    });
</script>
</html>
