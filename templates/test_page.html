<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-flask"></i> Test Page</h1>
            <p>Welcome to the test!</p>
        </div>
        
        <div class="main-content" style="padding: 50px; text-align: center;">
            <div class="test-card" style="background: linear-gradient(135deg, #28a745, #20c997);">
                <div class="test-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h2>You're all set!</h2>
                <p>Your information has been verified. The test will begin shortly.</p>
                <button class="start-test-btn" onclick="window.location.href='/logout'">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
        
        <div class="footer">
            <p>Secure Test Portal - Test Page</p>
        </div>
    </div>
</body>
</html>
